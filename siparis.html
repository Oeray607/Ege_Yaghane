"#kvkk": { baslik: "KVKK Aydınlatma Metni", icerik: `<p><strong>Ege Yağhane Kişisel Verilerin Korunması ve İşlenmesi Aydınlatma Metni</strong></p><p>Ege Yağhane olarak, müşterilerimizin, potansiyel müşterilerimizin ve web sitemizi ziyaret eden tüm şahısların kişisel verilerinin güvenliğine ve gizliliğine en üst düzeyde önem vermekteyiz. Bu hassasiyetle, 6698 sayılı Kişisel Verilerin Korunması Kanunu (“KVKK”) uyarınca, veri sorumlusu sıfatıyla kişisel verilerinizi aşağıda açıklanan şartlarda ve mevzuatta öngörülen sınırlar dahilinde işlemekteyiz.</p><p><strong>1. Kişisel Verilerin Toplanması ve İşlenme Amacı</strong><br>Web sitemiz üzerinden sipariş oluşturmanız, iletişim formlarını doldurmanız veya bültenimize üye olmanız durumunda; adınız, soyadınız, iletişim bilgileriniz (telefon, e-posta), teslimat ve fatura adresleriniz toplanmaktadır. Bu veriler; siparişlerinizin size sorunsuz ulaştırılması, faturalandırma süreçlerinin yürütülmesi, talep halinde müşteri desteği sağlanması ve yasal yükümlülüklerimizin (Tüketici Kanunu vb.) yerine getirilmesi amacıyla işlenmektedir.</p><p><strong>2. Kişisel Verilerin Aktarılması</strong><br>Toplanan kişisel verileriniz, siparişlerinizin teslimatı için anlaşmalı olduğumuz kargo şirketleriyle ve ödeme işlemlerinin güvenli bir şekilde gerçekleşmesi için BDDK lisanslı ödeme kuruluşlarıyla, yalnızca hizmetin ifası amacıyla sınırlı olmak kaydıyla paylaşılmaktadır. Verileriniz kesinlikle üçüncü şahıslara satılmaz veya ticari amaçla izinsiz devredilmez.</p><p><strong>3. Veri Sahibinin Hakları</strong><br>KVKK’nın 11. maddesi uyarınca veri sahipleri; kişisel verilerinin işlenip işlenmediğini öğrenme, işlenmişse buna ilişkin bilgi talep etme, eksik veya yanlış işlenmişse düzeltilmesini isteme ve kanuni şartlar gerçekleştiğinde silinmesini veya yok edilmesini talep etme haklarına sahiptir. Taleplerinizi <strong>info@egeyaghane.com</strong> adresi üzerinden bize iletebilirsiniz.</p>` },

"#iade": { baslik: "İade Politikamız", icerik: `<p><strong>Ege Yağhane İade ve İptal Şartları</strong></p><p>Müşteri memnuniyeti bizim için her şeyden önde gelir. Ancak sattığımız ürünlerin "Gıda" kategorisinde olması sebebiyle, insan sağlığını ve hijyeni korumak adına yasal çerçevede bazı özel şartlar bulunmaktadır.</p><p><strong>Cayma Hakkı ve İade Şartları</strong><br>Tüketicinin Korunması Hakkında Kanun gereği, siparişinizin size teslim edildiği tarihten itibaren <strong>14 gün içinde</strong> hiçbir gerekçe göstermeksizin iade hakkınız bulunmaktadır. <strong>Ancak; zeytinyağı ve benzeri gıda ürünlerinde iadenin kabul edilebilmesi için ürünün ambalajının kesinlikle açılmamış, güvenlik bandının koparılmamış ve ürünün orijinalliğinin bozulmamış olması şarttır.</strong> Kapağı açılmış veya kullanılmış gıda ürünleri yasa gereği iade alınamaz.</p><p><strong>Kargoda Hasar Gören Ürünler</strong><br>Siparişiniz kargo görevlisi tarafından size teslim edildiğinde, kutuyu görevlinin yanında açarak kontrol etmeniz rica olunur. Teneke veya şişelerde ezilme, patlama veya sızdırma gibi kargo kaynaklı bir hasar tespit ederseniz, lütfen ürünü teslim almayarak kargo görevlisine <strong>"Hasar Tespit Tutanağı"</strong> tutturunuz ve anında bizimle iletişime geçiniz. Tutanak tutulan ürünlerin değişimi veya iadesi derhal yapılacaktır.</p><p><strong>İade Süreci ve Ücret İadesi</strong><br>İade taleplerinizi info@egeyaghane.com adresine veya müşteri hizmetleri numaramıza iletebilirsiniz. Onaylanan iadelerde, ürünlerin depomuza sağlam bir şekilde ulaşmasını takip eden 3 ila 7 iş günü içerisinde ödediğiniz tutar, ödeme yaptığınız karta/hesaba kesintisiz olarak iade edilir.</p>` }, 
"#hizmet": { baslik: "Hizmet Standartlarımız", icerik: `<p><strong>Ege Yağhane Kalite ve Hizmet Standartları</strong></p><p>Asırlık zeytin ağaçlarının bereketini, en doğal ve saf haliyle sofralarınıza taşımak Ege Yağhane'nin en temel vizyonudur.</p><p><strong>Üretim ve Doğallık Garantisi</strong><br>Satışa sunduğumuz tüm zeytinyağlarımız, erken hasat ve soğuk sıkım prensiplerine uygun olarak, zeytinin içerisindeki fenolik bileşenler ve vitaminler korunarak üretilmektedir. Ürünlerimizde hiçbir koruyucu, katkı maddesi veya kimyasal işleme yer verilmez.</p><p><strong>Paketleme ve Kargo Standartları</strong><br>Ürünlerimizin sizlere ilk günkü tazeliğinde ulaşması için, ışık ve ısı geçirmeyen özel tenekelerde veya koyu renkli cam şişelerde dolum yapıyoruz. Kargolama sürecinde ezilme ve kırılmalara karşı hava yastıklı özel koruma kılıfları ve dayanıklı koliler kullanarak ürün güvenliğini maksimuma çıkarıyoruz.</p><p><strong>Müşteri İletişimi</strong><br>Sipariş öncesi ve sonrası tüm sorularınız, zeytinyağı tadımı hakkındaki merak ettikleriniz veya önerileriniz için WhatsApp destek hattımız üzerinden mesai saatleri içerisinde bize doğrudan ulaşabilirsiniz. Sizin sofranızdaki tebessüm, bizim en büyük referansımızdır.</p>` },

        urunler[secilen].adet = 1;
    }

    const listeKapsayici = document.getElementById('ey-urunler-listesi');
    const toplamTutarAlani = document.getElementById('ey-genel-toplam');
    const siparisBtn = document.getElementById('ey-kukla-btn');
    const sozlesmeOnayKutusu = document.getElementById('ey-sozlesme-onay');
    
    
    let guncelSiparisOzeti = "";
    function butonDurumunuGuncelle(genelToplam) {
        if (genelToplam === 0) {
            siparisBtn.disabled = true;
            siparisBtn.innerText = "SEPETİNİZ BOŞ";
        } else if (!sozlesmeOnayKutusu.checked) {
            siparisBtn.disabled = true;
            siparisBtn.innerText = "SÖZLEŞMEYİ ONAYLAYIN";
        } else {
            siparisBtn.disabled = false;
            siparisBtn.innerText = "SİPARİŞİ TAMAMLA";
        }
    }
    
function sepetiCiz() {
      listeKapsayici.innerHTML = ''; 
      let genelToplam = 0;
      guncelSiparisOzeti = "\n--- SİPARİŞ DETAYI ---\n\n";

      for (const key in urunler) {
          const urun = urunler[key];
          genelToplam += (urun.fiyat * urun.adet);
          
          
          
        if(urun.adet > 0) {
              guncelSiparisOzeti += `• ${urun.baslik}\n  => ${urun.adet} Adet x ${urun.fiyat.toLocaleString('tr-TR')} ₺ = ${(urun.fiyat * urun.adet).toLocaleString('tr-TR')} ₺\n\n`;
          }

          const html = `
          <div class="ey-urun-kart">
              <img src="${urun.resim}" class="ey-urun-resim">
              <div class="ey-urun-detay">
                  <h4 class="ey-urun-adi">${urun.baslik}</h4>
                  <p class="ey-urun-fiyat">${urun.fiyat.toLocaleString('tr-TR')} ₺</p>
              </div>
              <div class="ey-adet-kontrol">
                  <button class="ey-btn-eksi" onclick="adetDegistir('${urun.id}', -1)">-</button>
                  <div class="ey-adet-gosterge">${urun.adet}</div>
                  <button class="ey-btn-arti" onclick="adetDegistir('${urun.id}', 1)">+</button>
              </div>
          </div>`;
          listeKapsayici.innerHTML += html;
      }

      toplamTutarAlani.innerText = genelToplam.toLocaleString('tr-TR') + ' ₺';
      
      guncelSiparisOzeti += `\n>> GENEL TOPLAM: ${toplamTutarAlani.innerText}`;

      butonDurumunuGuncelle(genelToplam);
  }

  sozlesmeOnayKutusu.addEventListener('change', function() {
      let toplam = 0;
      for (const key in urunler) toplam += (urunler[key].fiyat * urunler[key].adet);
      butonDurumunuGuncelle(toplam);
  });

  window.adetDegistir = function(id, miktar) {
      if (urunler[id].adet + miktar >= 0) { 
          urunler[id].adet += miktar;
          sepetiCiz(); 
      }
  };

sepetiCiz();

   siparisBtn.addEventListener('click', function(e) {
      e.preventDefault();
      
      const gercekFormButonu = document.querySelector('.wpforms-submit');
      const ninjaKutusu = document.querySelector('.gizli-sepet textarea');
      
      if (gercekFormButonu && ninjaKutusu) {
          ninjaKutusu.value = guncelSiparisOzeti;
          gercekFormButonu.click();
      }
  });
  if (typeof jQuery !== 'undefined') {
      jQuery(document).on('wpformsAjaxSubmitSuccess', function() {
          document.getElementById('basarili-modal').style.display = 'block';
      });
  }


  const okBtn = document.getElementById('basarili-ok-btn');
  if (okBtn) {
      okBtn.addEventListener('click', function() {
          window.location.href = '/';
      });
  }

});
</script>
